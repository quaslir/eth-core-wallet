name: C++ Hardcore CI

on:
  push:
    branches: ['**'] 
  pull_request:
    branches: ['**']

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++] # Проверяем на обоих, чтобы не было привязки к вендору

    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ${{ matrix.compiler }} libssl-dev cppcheck

      - name: Static Analysis (Cppcheck)
        run: |
          cppcheck --enable=all --error-exitcode=1 --inline-suppr .

      - name: Configure CMake (Debug + Sanitizers)

        run: |
          cmake -B build \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-Wall -Wextra -Wpedantic -Werror -fsanitize=address,undefined"

      - name: Build
        run: cmake --build build

      - name: Run Tests (CTest)
        working-directory: build
  
        run: ./tests/eth-core-wallet-tests